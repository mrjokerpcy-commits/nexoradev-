# /etc/nginx/sites-available/nexora-panel
# ─────────────────────────────────────────────
# NexoraDev Panel — Nginx config
# Run: sudo certbot --nginx -d panel.nexoradev.com
# ─────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name panel.nexoradev.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name panel.nexoradev.com;

    # ── SSL (Certbot fills these in) ──
    ssl_certificate     /etc/letsencrypt/live/panel.nexoradev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.nexoradev.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── SSL hardening ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Rate limiting zones ──
    limit_req_zone $binary_remote_addr zone=panel_general:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=panel_login:10m rate=5r/m;

    # ── File size limit ──
    client_max_body_size 15M;

    # ── Proxy to Node.js ──
    location /api/ {
        limit_req zone=panel_general burst=10 nodelay;
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Stricter rate limit for login
    location /api/auth/login {
        limit_req zone=panel_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Serve frontend static files ──
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block sensitive paths ──
    location ~ /\. { deny all; }
    location ~ /\.env { deny all; }
    location ~* \.(log|sql|bak|git)$ { deny all; }
}
